<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BabyMilu CRM</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen" class="login-container">
    <div class="login-box">
      <h2>BabyMilu CRM</h2>
      <div id="login-error" class="login-error"></div>
      <input type="password" id="password-input" placeholder="Password" autocomplete="current-password">
      <button id="login-btn">Log in</button>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="hidden">
    <div class="header">
      <h1>BabyMilu CRM — Lead Dashboard</h1>
      <button id="logout-btn">Logout</button>
    </div>

    <div class="stats-bar" id="stats-bar"></div>

    <div class="toolbar">
      <input type="text" id="search-input" placeholder="Search by name, handle, or ID...">
      <select id="state-filter">
        <option value="">All States</option>
        <option value="new">New</option>
        <option value="contacted">Contacted</option>
        <option value="responded">Responded</option>
        <option value="intent_to_buy">Intent to Buy</option>
        <option value="purchased">Purchased</option>
        <option value="dropped">Dropped</option>
      </select>
      <div class="bulk-actions">
        <span id="selected-count"></span>
        <button id="bulk-contacted-btn" class="hidden">Mark Contacted</button>
        <button id="bulk-dropped-btn" class="hidden">Mark Dropped</button>
      </div>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th class="col-check"><input type="checkbox" id="select-all"></th>
            <th data-sort="name">Name <span class="sort-arrow"></span></th>
            <th data-sort="discordUsername">Handle <span class="sort-arrow"></span></th>
            <th data-sort="state">State <span class="sort-arrow"></span></th>
            <th data-sort="lastInteractedAt">Last Interacted <span class="sort-arrow"></span></th>
            <th data-sort="createdAt">Created <span class="sort-arrow"></span></th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="leads-body"></tbody>
      </table>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
